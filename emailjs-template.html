<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Quiz Result</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f9;font-family:system-ui,-apple-system,sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
         style="background:#f4f6f9;padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0"
               style="width:100%;max-width:560px;background:#ffffff;border-radius:12px;
                      overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background:#1e2130;padding:28px 32px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td>
                    <span style="display:inline-block;background:#7c6af7;color:#fff;
                                 font-size:14px;font-weight:800;padding:5px 10px;
                                 border-radius:7px;letter-spacing:-0.5px;">JS</span>
                    <span style="color:#9ca3af;font-size:13px;margin-left:10px;
                                 vertical-align:middle;">JavaScript Quiz</span>
                  </td>
                  <td align="right">
                    <span style="color:#6b7280;font-size:12px;">Quiz Result</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Student info banner -->
          <tr>
            <td style="background:#f8f7ff;padding:24px 32px;border-bottom:1px solid #ede9fe;">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="vertical-align:top;">
                    <div style="background:#ede9fe;border-radius:50%;width:46px;height:46px;
                                display:inline-block;text-align:center;line-height:46px;
                                font-size:22px;">
                      👤
                    </div>
                  </td>
                  <td style="vertical-align:top;padding-left:14px;">
                    <div style="font-size:18px;font-weight:700;color:#1e2130;">{{name}}</div>
                    <div style="font-size:12px;color:#9ca3af;margin-top:3px;">{{time}}</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Result body -->
          <tr>
            <td style="padding:28px 32px;">
              <p style="margin:0 0 6px;font-size:12px;font-weight:600;color:#7c6af7;
                        text-transform:uppercase;letter-spacing:0.06em;">Result Summary</p>
              <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;
                          padding:18px 20px;font-family:'Courier New',Courier,monospace;
                          font-size:13px;line-height:1.8;color:#374151;white-space:pre-wrap;
                          word-break:break-word;">{{message}}</div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f9fafb;padding:18px 32px;border-top:1px solid #f3f4f6;
                       text-align:center;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">
                Sent automatically from the <strong style="color:#7c6af7;">JS Quiz App</strong>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
